<VirtualHost *:80>
    ServerName wordpress.test
    DocumentRoot "/var/www/html/wordpress"
    DirectoryIndex index.php
    <Directory "/var/www/html/wordpress">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php-fpm:9000"
    </FilesMatch>
</VirtualHost>